name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

    - name: Set up Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: 24.14.0
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install

    - name: Lint
      run: pnpm run lint --max-warnings=0

    - name: Type Check
      run: pnpm run type-check

    - name: Run Unit Tests
      run: pnpm run test:coverage

    - name: Get Playwright Version
      id: playwright-version
      run: |
        PLAYWRIGHT_VERSION=$(pnpm list @playwright/test --depth=0 --json | jq -r '.[0].devDependencies["@playwright/test"].version')
        echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: pnpm exec playwright install chromium --with-deps

    - name: Run E2E Tests
      run: pnpm run test:e2e:ci

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
      with:
        fail_ci_if_error: false

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
      with:
        report_type: test_results
        fail_ci_if_error: false

    - name: Check Documentation
      run: pnpm run docs

    - name: Build
      run: pnpm run build
      env:
        PUBLISH_BUNDLE_ANALYSE: true

    - name: Check build artifacts
      run: |
        ls -l dist/boks-sdk.js
        ls -l dist/esm/boks-sdk.js
        ls -l dist/cjs/boks-sdk.cjs
        ls -l dist/types/index.d.ts

    - name: Verify Exports & Package
      run: pnpm run check:all

    - name: Smoke Test (Import built ESM)
      run: |
        node -e "import { BoksClient, BoksController } from './dist/esm/boks-sdk.js'; console.log('✅ ESM Import Success')"
        node -e "import { BoksHardwareSimulator } from './dist/esm/simulator.js'; console.log('✅ Simulator Import Success')"
